  /api/races: # Cписок всех рас игрока
    get:
      summary: Cписок всех рас игрока
      description: |
        Получить список всех рас игрока
      tags:
        - Race

      security:
        - CookieAuth: []
      responses:
        "200":
          description: "**OK**"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      $ref: '#/components/schemas/RaceId'
                    name:
                      $ref: '#/components/schemas/RaceName'
                    readonly:
                      type: boolean
                      description: |
                        True, если расу нельзя редактировать (она участвовала хотя бы в одной завершенной игре или участвует в текущей).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

