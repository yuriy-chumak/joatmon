openapi: "3.0.0"
# форматирование: https://spec.commonmark.org/0.27/
# внутренние кросслинки: https://swagger.io/docs/specification/links/
info:
  version: "1.0"
  title: "JoATmon API"
  description: "JoATmon API"
  termsOfService: "https://www.gnu.org/licenses/gpl-3.0.html"
  license:
    name: "GPLv3"
    url: "https://www.gnu.org/licenses/gpl-3.0.html"

servers:
  - url: https://127.0.0.1:6060/joatmon/
    description: Локальный сервер

paths:
  # -----------------------------------------------------------------------------
  /api/whoami:
    get:
      summary: Кто я?
      security:
        - CookieAuth: []
      description: |
        Если неизвестно что делать или непонятно что происходит - делай *api/whoami*.  
        *С whoami, кстати, стоит все и начинать.*
      tags:
        - Base

      responses:
        "200":
          description: "OK"
        "401":
          description: "Unauthorized"


