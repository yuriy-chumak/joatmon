components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: session

#   # общие коды ошибок
#   responses:
#     Unauthorized: # 401
#       description: |
#         **Unauthorized**   
#         Пользователь не авторизован, пожалуйста выполните `/api/login`
#     Forbidden: # 403
#       description: |
#         **Forbidden**   
#         Пользователь временно забанен или аккаунт деактивирован.
#     NotFound: # 404
#       description: |
#         **Not Found**   
#         Запрошенный ресурс отсутствует, не принадлежит или не доступен пользователю.

#   # типы передаваемых объектов
#   schemas:
#     Credentials:
#       type: "object"
#       required:
#         - login
#         - password
#       properties:
#         login:
#           type: "string"
#           description: Логин
#         password:
#           type: "string"
#           description: Пароль
#     Race:
#       type: object
#       properties:
#         id:
#           type: integer
#         name:
#           type: string
#     RaceId:
#       type: integer
#       description: |
#         Уникальный идентификатор расы
#     RaceName:
#       type: string
#       description: |
#         Уникальное имя расы.
#     PRT:
#       type: integer
#       description: |
#         Primary Racial Trait
#         * 0, Hyper-Expansion (HE)  
#           Быстрая экспансия в галактике.
#         * 1, Super Stealth (SS)  
#           Улучшенные способности к невидимости.
#         * 2, War Monger (WM)  
#           Атакующая раса, сильна в атаке и оружии, слаба в защите.
#         * 3, Claim Adjuster (CA)  
#           Ориентация на терраформинг — изменение условий планет под себя.
#         * 4, Inner-Strength (IS)  
#           Защитная раса, сложно атаковать и проще защищаться.
#         * 5, Space Demolition (SD)  
#           Мастера установки минных полей.
#         * 6, Packet Physics (PP)  
#           Специализация в пакетных движках.
#         * 7, Interstellar Traveler (IT)  
#           Специальные способности и возможности в гейтовании кораблей и грузов.
#         * 8, Alternate Reality (AT)  
#           Раса живет не на поверхности планет, а на орбите в старбазах.
#         * 9, Jack of All Trades (JoAT)  
#           Без серьезных недостатков и сильных преимуществ.
#       minimum: 0
#       maximum: 9
#     LRTs:
#       type: integer
#       description: |
#         Lesser Racial Traits
#         * 1, Improved Fuel Efficiency (IFE)  
#           Улучшенное использование топлива.
#         * 2, No Ram Scoop Engines (NRSE)  
#           Нет двигателей RamScoop.
#         * 4, Total Terraforming (TT)  
#           Улучшенный терраформинг.
#         * 8, Cheap Engines (CE)  
#           Дешевые двигатели.
#         * 16, Advanced Remote Mining (ARM)  
#           Улучшенное удаленная добыча.
#         * 32, Only Basic Remote Mining (OBRM)  
#           Только базовая удаленная добыча.
#         * 64, Improved Starbases (ISB)  
#           Улучшенные орбитальные станции.
#         * 128, No Advanced Scanners (NAS)  
#           Нет продвинутых сканеров.
#         * 256, Generalized Research (GR)  
#           Децентрализованное изучение наук.
#         * 512, Low Starting Population (LSP)  
#           Уменьшенная популяция на старте.
#         * 1024, Ultimated Recycling (UR)  
#           Улучшенная переработка.
#         * 2048, Bleeding Edge Technology (BET)  
#           Передовые технологии.
#         * 4096, Mineral Alchemy (MA)  
#           Алхимия минералов.
#         * 8192, Regenerating Shields (RS)  
#           Восстанавливающиеся щиты.
#       minimum: 0
#       maximum: 16383
#     Ready:
#       type: object
#       properties:
#         year:
#           type: integer
#           description: Текущий код (контрольное поле)
#             Если не установлен - берется актуальный на момент игры
#         set:
#           type: boolean
#           description: |
#             * true - сообщить, что ход сделан
#             * false - отменить готовность и позволить перепланировать ход
#       required:
#         - set


